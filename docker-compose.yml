services:
  portfolio:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - portfolio-data:/data
    environment:
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - TZ=${TZ:-Europe/Amsterdam}
      - PRICE_FETCH_CRON=${PRICE_FETCH_CRON:-0 18 * * 1-5}
    restart: unless-stopped

volumes:
  portfolio-data:
